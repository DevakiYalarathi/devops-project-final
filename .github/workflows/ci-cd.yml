name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allows manual trigger from Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Debug step: check if secrets exist
    - name: Debug secrets
      run: |
        echo "Docker Username: ${{ secrets.DOCKER_USERNAME }}"
        echo "Password length: ${#DOCKER_PASSWORD}"
      env:
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:latest \
                     -t ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }} .

    - name: Push Docker Image (latest)
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:latest

    - name: Push Docker Image (commit SHA)
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ github.sha }}