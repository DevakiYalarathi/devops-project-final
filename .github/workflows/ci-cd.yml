name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker tags
      id: vars
      run: |
        echo "sha_tag=${GITHUB_SHA}" >> $GITHUB_ENV
        echo "latest_tag=latest" >> $GITHUB_ENV

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.latest_tag }} \
                     -t ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.sha_tag }} .

    - name: Push Docker Image (latest)
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.latest_tag }}

    - name: Push Docker Image (commit SHA)
      run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-app:${{ env.sha_tag }}